# Deploys to Fly.io on every push to main (and on demand via "Run workflow").
# Requires the FLY_API_TOKEN repository secret — create one scoped to this
# app with:  fly tokens create deploy -a family-memories
# then add it at GitHub → Settings → Secrets and variables → Actions.
name: Fly Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
